<!DOCTYPE html>
<html lang="id">
<head>

    <title>Curriculum Vitae - Salwa Asyfa</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f8f7;

        }

        .cv-container {
            max-width: 800px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);

        .cv-header {
            text-align: center;
        }

        .cv-header img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 4px solid #2e8b57;
        }

        h2 {
            color: #2e8b57;
            border-bottom: 2px solid #2e8b57;
            padding-bottom: 5px;
        }

        .contact a {
            display: block;
            margin-top: 5px;
            text-decoration: none;
            color: #2e8b57;
            font-weight: bold;
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 15px;
            background-color: #2e8b57;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        .back-btn:hover {
            background-color: #246b45;
        }
    </style>
</head>
